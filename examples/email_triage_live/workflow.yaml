id: email-triage-live
name: Email Triage (live validation, read-only)
description: |
  Validation run of the email-triage rubric against a REAL personal mailbox.
  Read-only on purpose: the agent has NO tools — it cannot send replies or
  apply labels; it only classifies. Results land as structured fields on
  step_executions via record_email_triage, queryable across runs.

  Purpose (see README.md): establish the rubric-only baseline and watch for
  memory-shaped failures — the adoption trigger for the veracium per-entity
  memory library logged in docs/SEMANTICS.md ("Deferred: veracium").

trigger:
  # ROLLBACK ARTIFACT since the 2026-07-18 cutover to email-triage-apply
  # (docs/EMAIL_TRIAGE_ACT_PLAN.md): manual on purpose so the two siblings
  # never double-poll the mailbox. To roll back, restore this trigger to
  # `email` (config: provider gmail, account qspencer@gmail.com,
  # poll_interval_seconds 120, label INBOX, slim_payload true) and set the
  # apply sibling back to manual, then restart.
  type: manual
  example_payload:
    provider: "gmail"
    message_id: "example-id"
    thread_id: "example-thread"
    from_address:
      address: "someone@example.com"
      name: "Someone"
    to:
      - address: "qspencer@gmail.com"
    cc: []
    bcc: []
    subject: "Example subject"
    body_text: "Example body."
    body_html: null
    received_at: "2026-07-11T09:00:00+00:00"
    labels: ["INBOX"]
    in_reply_to: null
    headers: {}

steps:
  - id: triage
    label: "Classify the email (read-only)"
    type: agentic
    model: us.anthropic.claude-haiku-4-5-20251001-v1:0
    # Read-only validation: no tools, and a capability allowlist that pins it
    # that way even if someone adds tools to the step later.
    tools: []
    capabilities:
      tools: []
    goal: |
      You are triaging an inbound email — CLASSIFICATION ONLY. You have no
      tools: never attempt to reply or label; this is a read-only validation
      run. The trigger payload contains the full message: from_address,
      to, cc, subject, body_text, received_at, labels — plus, when the
      body is image-only (empty body_text), a `body_structure` summary of
      the HTML (link domains, image count, alt texts) derived safely
      without fetching anything.

      Apply the rubric in your memory (above this prompt) to choose exactly
      one `category` from the seven-bucket catalog.

      Then respond with ONLY a JSON object on one line — no prose, no
      markdown fences:
        {"category": "<one of seven>", "confidence": <0..1>,
         "reply_drafted": false, "labels_applied": [],
         "summary": "<one short sentence — why this category>"}
    policy:
      max_iterations: 2
      # Rubric (~1.6k) + goal + slimmed payload; long personal emails can
      # still push past the old 4k. Real-world calibration from the first
      # live batch.
      max_total_tokens: 8000

  - id: record
    label: "Record the triage result"
    type: deterministic
    function: record_email_triage
    output_renderer: triage
    config:
      triage_from: steps.triage.output_text

edges:
  - from: triage
    to: record

policies:
  max_total_tokens: 12000
  budget_action: pause

# Learned per-entity memory (veracium, write-only slice — docs/SEMANTICS.md
# "veracium — adopted"). The ENGINE writes these after a successful run; the
# agent has no memory tool and recall-injection is a later slice, so triage
# behavior is unchanged. Two observations per message: the mail itself enters
# as third_party (its claims are quarantined, never stored as user facts);
# the triage verdict enters as system (this is what accumulates per-sender
# classification history). Cost: two extra Haiku distill calls per message.
learned_memory:
  user_id: qspencer@gmail.com
  # G10 read side: before the triage step, recall what prior runs learned
  # about this sender (normalized address) and inject it — provenance fence
  # intact — below the rubric. Zero LLM cost (subgraph render, wiki off).
  recall:
    query_from: trigger.from_address.address
    token_budget: 600
  observations:
    - text: |
        Received email from {trigger.from_address.name} <{trigger.from_address.address}>
        Subject: {trigger.subject}

        {trigger.body_text}
      author: third_party
      event_type: email
      date_from: trigger.received_at
      ref_from: trigger.message_id
    - text: >
        The triage agent classified the email from {trigger.from_address.address}
        (subject: "{trigger.subject}") as {steps.record.category} with confidence
        {steps.record.confidence}. Reason: {steps.record.summary}
      author: system
      # The verdict is ours, but its text embeds third-party content (sender,
      # subject, a summary derived from the body) — declare the mixed
      # provenance so trust caps at third_party level (veracium >=0.1.7 fix
      # for the system-event laundering channel found on this very workflow).
      derived_from: third_party
      event_type: triage
      date_from: trigger.received_at
      ref_from: trigger.message_id
