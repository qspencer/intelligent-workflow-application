id: dmarc-ingest
name: DMARC Report Ingest
description: |
  Watches a Gmail inbox for DMARC aggregate reports (providers send them as
  .zip / .xml.gz attachments), unzips them, and delivers the XML to the
  dmarc-viewer app's watched directory — which auto-loads any .xml written
  into it. Fully deterministic: no LLM anywhere in the pipeline.

  Shape: the trigger handles *acquisition* (server-side Gmail filtering via
  `query`; attachment download via `download_dir`, which puts local file
  paths on the payload as `attachment_paths`) — then two reusable steps:
  extract_archive unzips into a staging dir, copy_files delivers the XMLs
  to the destination. Each step is a catalog capability usable in any
  other workflow.

  Backfill ("go through all existing mail") is a separate one-shot:
  `backend/tools/fetch_dmarc.py` fetches historical messages with the same
  query, downloads their attachments the same way, and fires this workflow
  once per message via the run-batch API.

trigger:
  type: email
  config:
    provider: gmail
    account: qrsconsulting@quentinspencer.com
    # Server-side filter: only mail carrying zip/gz attachments fires.
    # DMARC subjects always start with "Report domain:"; keeping the filter
    # on attachments is looser but catches providers with odd subjects.
    query: 'has:attachment (filename:zip OR filename:gz)'
    download_dir: /tmp/dmarc-spool
    poll_interval_seconds: 300
  example_payload:
    subject: "Report domain: quentinspencer.com Submitter: google.com"
    attachment_paths:
      - /tmp/dmarc-spool/example-msg-id/google.com!quentinspencer.com!1700000000!1700086400.zip

steps:
  - id: extract_reports
    label: "Unzip report archives"
    type: deterministic
    function: extract_archive
    config:
      paths_from: trigger.attachment_paths
      dest_dir: /tmp/dmarc-extracted
      member_suffix: .xml

  - id: deliver_reports
    label: "Deliver XMLs to dmarc-viewer"
    type: deterministic
    function: copy_files
    config:
      paths_from: steps.extract_reports.extracted
      dest_dir: /home/ubuntu/Dev/dmarc-viewer/xml-files
      suffix: .xml

edges:
  - from: extract_reports
    to: deliver_reports
