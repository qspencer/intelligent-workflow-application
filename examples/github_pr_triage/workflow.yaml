id: github-pr-triage
name: GitHub PR Triage
description: |
  Receives a GitHub pull-request payload (either via webhook or fired
  manually with `tools/fire.py`), asks Claude to categorize the PR and
  flag review concerns, and records the structured triage result. The
  trigger payload is the same shape `gh api repos/<owner>/<repo>/pulls`
  returns — title, body, additions, deletions, changed_files, user.login,
  base/head refs, etc.

trigger:
  type: webhook
  config:
    trigger_id: github-pr-triage
  # Slim GitHub PR shape — same fields `scripts/fetch_prs.sh` emits.
  example_payload:
    number: 4271
    title: "fix(billing): retry stripe webhooks on transient 503"
    body: "## What\nStripe's webhook delivery occasionally returns 503...\n\n## Testing\nNew unit tests in tests/billing/test_stripe_retry.py."
    user:
      login: "maria-r"
    state: "open"
    draft: false
    additions: 64
    deletions: 7
    changed_files: 3
    base:
      ref: "main"
      repo:
        full_name: "acme/billing"
    head:
      ref: "maria/stripe-retry"

steps:
  - id: triage
    label: "Triage the pull request"
    type: agentic
    model: us.anthropic.claude-haiku-4-5-20251001-v1:0
    tools: []
    goal: |
      You are triaging a GitHub pull request. The trigger payload is the
      raw PR object (title, body, additions, deletions, changed_files,
      user.login, author_association, base/head refs).

      The rubric loaded into your memory (above this prompt) defines the
      categories, complexity scale, concern catalog, and output format.
      Apply it and respond with ONLY the JSON object on one line — no
      prose, no markdown fences.
    policy:
      max_iterations: 2
      max_total_tokens: 4000

  - id: record_triage
    label: "Record the triage result"
    type: deterministic
    function: record_pr_triage
    output_renderer: triage
    config:
      triage_from: steps.triage.output_text

edges:
  - from: triage
    to: record_triage

policies:
  max_total_tokens: 10000
  budget_action: pause
