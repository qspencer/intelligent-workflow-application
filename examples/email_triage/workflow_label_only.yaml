id: email-triage-label-only
name: Email Triage (label-only)
description: |
  Variant of `workflow.yaml` with `email_send` removed — the agent can
  CLASSIFY and APPLY LABELS but cannot send replies. Used when
  validating the rubric against a personal inbox where accidental
  auto-replies would have real consequences.

  Trigger payload shape still matches `EmailMessage.model_dump()` —
  fixtures + fetched JSON files are interchangeable with the main
  workflow.

trigger:
  type: manual

steps:
  - id: triage
    type: agentic
    model: us.anthropic.claude-haiku-4-5-20251001-v1:0
    tools: [email_label_apply]
    capabilities:
      tools: [email_label_apply]
    goal: |
      You are triaging an inbound email. The trigger payload contains the
      full message: provider, message_id, thread_id, from_address (with
      address + optional name), to, cc, subject, body_text, body_html,
      received_at, labels.

      Apply the rubric in your memory (above this prompt) to:
        1. Choose exactly one `category` from the five-bucket catalog.
        2. Apply one triage label via `email_label_apply` (e.g.
           `triaged/urgent`, `triaged/fyi`). The original Gmail message_id
           is in the trigger payload as `message_id`.

      NOTE: this variant has NO `email_send` tool — `reply_drafted` in
      the output JSON must always be `false`. Do not attempt to call
      `email_send`; it doesn't exist in this workflow.

      Then respond with ONLY a JSON object on one line — no prose, no
      markdown fences:
        {"category": "<one of five>", "confidence": <0..1>,
         "reply_drafted": false, "labels_applied": [<labels you applied>],
         "summary": "<one short sentence — why this category>"}
    policy:
      max_iterations: 5
      # Each agent iteration on real personal mail uses 5-8k tokens (the
      # rubric is ~3k, the JSON-dumped trigger payload with truncated
      # body_text is ~1-2k, the response is ~1-2k). The agent typically
      # needs 2 iterations: one tool_use(email_label_apply) + one final
      # JSON response. 20000 gives margin for 3 iterations on edge cases.
      max_total_tokens: 20000

  - id: record
    type: deterministic
    function: record_email_triage
    config:
      triage_from: steps.triage.output_text

edges:
  - from: triage
    to: record

policies:
  # Real personal email is noisier than synthetic fixtures. Raised from
  # 10k to 30k so the workflow doesn't pause between triage and record
  # steps; per-message run still typically lands at 5-10k tokens after
  # the batch driver strips body_html and truncates body_text.
  max_total_tokens: 30000
  budget_action: pause
