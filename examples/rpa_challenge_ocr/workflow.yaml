id: rpa-challenge-ocr
name: RPA Challenge OCR
description: |
  End-to-end browser-automation validation workload against
  https://rpachallengeocr.azurewebsites.net/. Six steps: open + start the
  challenge, read the invoice table, filter to overdue invoices, OCR each
  invoice image to extract structured fields, build a CSV from the
  extracted rows, upload + submit. Exercises every browser_* tool category
  plus the new image_ocr / filter_rows_by_date / write_csv stock pieces.

trigger:
  type: manual
  # No payload needed ‚Äî the agent drives the browser from a fixed URL.
  example_payload: {}

steps:
  - id: open_challenge
    label: "Open the challenge"
    type: agentic
    model: us.anthropic.claude-haiku-4-5-20251001-v1:0
    tools: [browser_navigate, browser_click, browser_wait_for]
    goal: |
      You are operating a browser. Do exactly this:
        1. browser_navigate to https://rpachallengeocr.azurewebsites.net/
        2. browser_click selector `#start`
        3. browser_wait_for selector `#tableSandbox tr` state `visible` (waits
           until the JS-rendered table has at least one row)
      Then respond with just the word "ready".
    policy:
      max_iterations: 8
      max_total_tokens: 2000

  - id: read_table
    label: "Read the invoice table"
    type: agentic
    model: us.anthropic.claude-haiku-4-5-20251001-v1:0
    tools: [browser_read_table, browser_read_text, browser_click]
    goal: |
      The invoice table at `#tableSandbox` is paginated via DataTables.
      You MUST walk every page and collect EVERY row, or the final
      submission will be incomplete and rejected.

      Procedure:
        1. browser_read_text on `#tableSandbox_paginate`. The result is
           a string like "Previous 1 2 3 Next". The largest integer in
           that string is the total page count N.
        2. browser_read_table on `#tableSandbox` ‚Äî these are page-1 rows.
           Save them.
        3. For each page p from 2 to N (inclusive):
             a. browser_click on `#tableSandbox_paginate a:has-text("${p}")`
                ‚Äî clicks the page-number button. DataTables redraws the
                tbody synchronously.
             b. browser_read_table on `#tableSandbox`. Append the new
                rows to your accumulated list.
        4. If N == 1, you only need step 2.

      Each row from browser_read_table has keys including `ID`,
      `Due Date`, and `Invoice_href` (the absolute URL of the JPG ‚Äî
      the parser adds `_href` for cells containing a single link).

      Output a SINGLE JSON array combining ALL pages. Each entry:
        - `id`         ‚Äî copy `ID`
        - `due_date`   ‚Äî copy `Due Date`
        - `invoice_url`‚Äî copy `Invoice_href`
      Respond with the JSON array only ‚Äî no prose, no markdown fences.
    policy:
      # ~5 tool calls per page (read_text once + 1 click + 1 read_table
      # per page). Allow up to ~10 pages.
      max_iterations: 30
      max_total_tokens: 30000

  - id: filter_overdue
    label: "Filter to overdue"
    type: deterministic
    function: filter_rows_by_date
    config:
      rows_from: steps.read_table.output_text
      date_field: due_date
      cutoff: today
      comparison: on_or_before

  - id: extract_invoices
    label: "OCR each invoice"
    type: agentic
    model: us.anthropic.claude-haiku-4-5-20251001-v1:0
    tools: [browser_fetch_url, image_ocr]
    goal: |
      For each row in prior_steps.filter_overdue.kept_rows:
        1. browser_fetch_url with `url = row.invoice_url`. This saves the
           invoice JPG to the workflow's downloads dir and returns the
           local_path.
        2. image_ocr on that local_path. The OCR result has a `text` field.
        3. Parse the OCR text. The invoice template includes (case-varied):
           Invoice Number, Invoice Date, Company, Total Due.

      Respond with a single JSON array ‚Äî one object per row, keys exactly
      matching the challenge's expected CSV column names:
        - `ID`          ‚Äî copy `row.id`
        - `DueDate`     ‚Äî copy `row.due_date` (already DD-MM-YYYY)
        - `InvoiceNo`   ‚Äî the invoice number from the OCR text
        - `InvoiceDate` ‚Äî the invoice date from the OCR text, **formatted
                          as DD-MM-YYYY** (re-format if OCR gives ISO or
                          a written month)
        - `CompanyName` ‚Äî the issuing company name (e.g. "Aenean LLC")
        - `TotalDue`    ‚Äî the total amount as a plain number string like
                          "1234.40" (no currency symbol, no thousands sep)
      Order matches kept_rows. No prose, no markdown fences.
    policy:
      max_iterations: 60
      max_total_tokens: 50000

  - id: build_csv
    label: "Build the CSV"
    type: deterministic
    function: write_csv
    config:
      rows_from: steps.extract_invoices.output_text
      path: /tmp/rpa-challenge-output.csv
      # Column names + order MUST match the challenge's example CSV exactly
      # (see https://rpachallengeocr.azurewebsites.net/invoices/example.csv).
      columns: [ID, DueDate, InvoiceNo, InvoiceDate, CompanyName, TotalDue]

  - id: submit
    label: "Upload & submit"
    type: agentic
    model: us.anthropic.claude-haiku-4-5-20251001-v1:0
    tools: [browser_upload_file, browser_submit_form, browser_read_text, browser_screenshot]
    goal: |
      Submit the results:
        1. browser_upload_file at selector `input[name="csv"]` with file_path
           `/tmp/rpa-challenge-output.csv`
        2. browser_submit_form on selector `#submit form` ‚Äî the visible submit
           "button" is a `<div>` with display:none that the page never reveals,
           so we POST the form directly via JS. The form's action is `/upload`
           and the page navigates to that endpoint as a result.
        3. browser_read_text selector `body` ‚Äî capture the server response.
           Expected to be JSON like `{"success": true}` or `{"success": false}`.
        4. browser_screenshot the result (full_page true).
      Respond with the exact body text you read AND the screenshot path.
    policy:
      max_iterations: 8
      max_total_tokens: 15000

edges:
  - {from: open_challenge,   to: read_table}
  - {from: read_table,       to: filter_overdue}
  - {from: filter_overdue,   to: extract_invoices}
  - {from: extract_invoices, to: build_csv}
  - {from: build_csv,        to: submit}

policies:
  # Empirically: pagination walk + per-invoice OCR-and-extract pushes a
  # 3-page table to ~90k tokens. Set to 150k so a typical run completes
  # comfortably (about $0.15 at Haiku 4.5 pricing).
  max_total_tokens: 150000
  budget_action: pause
