name: Live tests (Bedrock + Gmail + Browser)

# Runs the @pytest.mark.live (Bedrock), @pytest.mark.gmail_live (Gmail),
# and @pytest.mark.browser_live (Playwright vs. the public RPA Challenge
# OCR site) suites on a weekly cadence to catch provider / external-site
# drift early. NOT a PR gate — these tests cost a few cents per Bedrock
# run and depend on third-party services going up + down independently
# of our code.
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID       — IAM user with bedrock:InvokeModel for the test region
#   AWS_SECRET_ACCESS_KEY   — paired with AWS_ACCESS_KEY_ID
#   GMAIL_CLIENT_CREDENTIALS_JSON — full contents of client_credentials.json
#                                   (the file downloaded from GCP console)
#   GMAIL_REFRESH_TOKEN     — refresh token from `tools/gmail_auth.py`
#
# Optional:
#   AWS_REGION (env var)    — defaults to us-east-1
#   GMAIL_ACCOUNT (env var) — defaults to intelligent.workflow.engine@quentinspencer.com
#
# Manual trigger via the Actions tab (workflow_dispatch) for ad-hoc runs.

"on":
  schedule:
    # Mondays 09:00 UTC — picked for low overlap with daily PR work.
    # Adjust if a different cadence makes sense.
    - cron: '0 9 * * MON'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: live-tests
  cancel-in-progress: false

jobs:
  live:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      BEDROCK_LIVE: "1"
      GMAIL_LIVE: "1"
      BROWSER_LIVE: "1"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      GMAIL_ACCOUNT: intelligent.workflow.engine@quentinspencer.com
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install system deps for PDF/OCR tests
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.5.x"

      - name: Sync deps
        # No fallback: this job holds live AWS + Gmail credentials, so a
        # lock mismatch must fail rather than resolve against the live index.
        run: uv sync --frozen

      - name: Install Chromium for live browser test
        # `--with-deps` lets Playwright apt-install the system libs Chromium
        # needs (fonts, X11, audio) — much safer than guessing apt packages.
        # ~30s in the weekly cron; not a PR-gate cost.
        run: uv run playwright install --with-deps chromium

      - name: Seed Gmail credentials from secrets
        env:
          GMAIL_CLIENT_CREDENTIALS_JSON: ${{ secrets.GMAIL_CLIENT_CREDENTIALS_JSON }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: |
          # Source-of-truth path used by tests/test_gmail_live.py.
          secrets_dir="${GITHUB_WORKSPACE}/.secrets/gmail/${GMAIL_ACCOUNT}"
          mkdir -p "${secrets_dir}"
          printf '%s' "${GMAIL_CLIENT_CREDENTIALS_JSON}" > "${secrets_dir}/client_credentials.json"
          printf '%s' "${GMAIL_REFRESH_TOKEN}" > "${secrets_dir}/refresh_token"
          chmod 600 "${secrets_dir}/client_credentials.json" "${secrets_dir}/refresh_token"
          # Sanity check the client credentials JSON parses — early failure
          # beats a confusing OAuth error 20 seconds in.
          uv run python -c "
          import json, sys
          d = json.load(open('${secrets_dir}/client_credentials.json'))
          assert 'installed' in d, 'client_credentials missing \"installed\" wrapper'
          inner = d['installed']
          for k in ('client_id', 'client_secret', 'auth_uri', 'token_uri'):
              assert inner.get(k), f'client_credentials missing {k}'
          print('client_credentials.json: OK')
          "

      - name: Run live tests (Bedrock + Gmail + Browser)
        # `live or gmail_live or browser_live` runs all three suites in
        # one pytest session. The browser end-to-end test is additionally
        # gated by BEDROCK_LIVE inside the test body, so it runs here
        # too (both gates are "1" in this job).
        # `-v` so failures show test names directly in the Actions UI.
        run: uv run pytest -m "live or gmail_live or browser_live" -v

      - name: Cleanup secrets
        if: always()
        run: rm -rf "${GITHUB_WORKSPACE}/.secrets"
