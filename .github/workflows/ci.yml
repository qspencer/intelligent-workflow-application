name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: every job here only reads the repo. No job needs to write
# contents, packages, or issues. Overrides the repo-default token scope.
permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workflow
          POSTGRES_PASSWORD: workflow
          POSTGRES_DB: workflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://workflow:workflow@localhost:5432/workflow_test
      DATABASE_URL: postgresql+asyncpg://workflow:workflow@localhost:5432/workflow_test
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install system deps for PDF/OCR tests
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          version: "0.5.x"

      - name: Sync deps
        # No `|| uv sync` fallback: a stale or tampered lock must fail loudly
        # here rather than silently re-resolving against the live index.
        run: uv sync --frozen

      - name: Audit dependencies (pip-audit)
        # Scans the synced environment against the OSV / PyPI advisory DBs.
        # Fails the build on any known CVE in a locked dependency.
        run: uv run --with pip-audit pip-audit

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src tests

      - name: Test (unit)
        run: uv run pytest -m "not integration" --cov=workflow_platform --cov-report=term-missing

      - name: Alembic upgrade + downgrade sanity
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head

      - name: Test (integration, requires Postgres)
        run: uv run pytest -m integration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Audit dependencies (npm audit)
        # Audit what we SHIP — production deps only — like pip-audit does for the
        # backend runtime. Every current advisory is in the dev toolchain
        # (vite / esbuild / vitest / vite-node) and never reaches the static
        # build; `npm audit --omit=dev` reports 0. The lone critical is the
        # Vitest *UI server* file-read/exec advisory, which requires running
        # `vitest --ui`/`--api` (we only run `vitest run` headless), so its
        # exploit surface isn't present. Fixing the dev-tool advisories in place
        # would mean major bumps (vite 5->8, vitest 2->4) — tracked separately,
        # not gated here. Still high/critical-gated so a shipped vuln fails CI.
        run: npm audit --omit=dev --audit-level=high

      - name: Test (Vitest)
        run: npm test

      - name: Build
        run: npm run build
