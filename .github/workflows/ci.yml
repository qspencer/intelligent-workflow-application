name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: every job here only reads the repo. No job needs to write
# contents, packages, or issues. Overrides the repo-default token scope.
permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workflow
          POSTGRES_PASSWORD: workflow
          POSTGRES_DB: workflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://workflow:workflow@localhost:5432/workflow_test
      DATABASE_URL: postgresql+asyncpg://workflow:workflow@localhost:5432/workflow_test
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install system deps for PDF/OCR tests
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.5.x"

      - name: Sync deps
        # No `|| uv sync` fallback: a stale or tampered lock must fail loudly
        # here rather than silently re-resolving against the live index.
        run: uv sync --frozen

      - name: Audit dependencies (pip-audit)
        # Scans the synced environment against the OSV / PyPI advisory DBs.
        # Fails the build on any known CVE in a locked dependency.
        run: uv run --with pip-audit pip-audit

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src tests

      - name: Test (unit)
        run: uv run pytest -m "not integration" --cov=workflow_platform --cov-report=term-missing

      - name: Alembic upgrade + downgrade sanity
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head

      - name: Test (integration, requires Postgres)
        run: uv run pytest -m integration

  schema:
    # Schemathesis contract/fuzz validation derived from FastAPI's OpenAPI
    # schema: every GET endpoint, fuzzed, must never 5xx. Free + no AWS (runs
    # the app in-process against in-memory repos + replay Bedrock), so it's a
    # PR gate — but its own job since the hypothesis sweep takes a couple of
    # minutes and shouldn't sit on the backend job's critical path.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.5.x"

      - name: Sync deps
        run: uv sync --frozen

      - name: Schemathesis contract tests (OpenAPI GET endpoints)
        env:
          SCHEMA_TESTS: "1"
        run: uv run pytest -m schema -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Audit dependencies (npm audit)
        # Fail CI on any high/critical advisory anywhere in the tree (prod or
        # dev). The dev toolchain was upgraded (vite 8 / vitest 4 / plugin-react
        # 6) to clear the prior dev-server/UI advisories at the source, so a
        # full audit is clean — no need to scope this to production deps.
        run: npm audit --audit-level=high

      - name: Test (Vitest)
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    # Playwright + axe (docs/TESTING.md T4): real-browser canvas flows + a11y
    # scans jsdom can't do. Self-contained — Playwright's webServer starts an
    # in-memory backend (replay Bedrock, no triggers, dev auth) + the Vite dev
    # server, so it's deterministic with no AWS / Postgres. Own job, ~2-3 min.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.5.x"

      - name: Sync backend deps
        working-directory: backend
        run: uv sync --frozen

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium (+ system libs)
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: E2E + a11y
        working-directory: frontend
        run: npm run test:e2e
