name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workflow
          POSTGRES_PASSWORD: workflow
          POSTGRES_DB: workflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://workflow:workflow@localhost:5432/workflow_test
      DATABASE_URL: postgresql+asyncpg://workflow:workflow@localhost:5432/workflow_test
    steps:
      - uses: actions/checkout@v5

      - name: Install system deps for PDF/OCR tests
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr poppler-utils

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.5.x"

      - name: Sync deps
        run: uv sync --frozen || uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src tests

      - name: Test (unit)
        run: uv run pytest -m "not integration" --cov=workflow_platform --cov-report=term-missing

      - name: Alembic upgrade + downgrade sanity
        run: |
          uv run alembic upgrade head
          uv run alembic downgrade base
          uv run alembic upgrade head

      - name: Test (integration, requires Postgres)
        run: uv run pytest -m integration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Test (Vitest)
        run: npm test

      - name: Build
        run: npm run build
